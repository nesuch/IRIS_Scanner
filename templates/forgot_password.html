<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS Forgot Password</title>
    <style>
        body { margin:0; font-family: Arial, sans-serif; background:#f0f2f5; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { width:100%; max-width:420px; background:#fff; border-radius:14px; padding:28px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
        .input { width:100%; box-sizing:border-box; padding:12px; margin-bottom:12px; border:1px solid #cfd8dc; border-radius:10px; }
        .btn { width:100%; padding:12px; border:none; border-radius:10px; background:#1f2d80; color:#fff; cursor:pointer; }
        .err { background:#fdecea; color:#b71c1c; padding:10px; border-radius:8px; margin-bottom:12px; }
        .ok { background:#e8f5e9; color:#1b5e20; padding:10px; border-radius:8px; margin-bottom:12px; }
        .note { margin-top:12px; font-size:13px; color:#677; }
    </style>
</head>
<body>
    <form class="card" method="POST" action="/forgot-password">
        <h2>Reset Password</h2>
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
        {% if success %}<div class="ok">{{ success }}</div>{% endif %}
        <input class="input" type="email" name="email" placeholder="Registered email" required />
        <input class="input" type="password" name="new_password" placeholder="New password (min 8 chars)" required />
        <input class="input" type="password" name="confirm_password" placeholder="Confirm new password" required />
        <button class="btn" type="submit">Reset Password</button>
        <div class="note"><a href="/login">Back to login</a></div>
    </form>
</body>
</html>
