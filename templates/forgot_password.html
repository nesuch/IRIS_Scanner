<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRIS Reset Password</title>
    <style>
        *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#1a2f7b,#4462dd);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{width:min(460px,100%);background:#fff;border-radius:18px;padding:30px;box-shadow:0 20px 50px rgba(0,0,0,.24)}
        .logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}.logo img{width:42px;height:42px}
        h2{margin:0 0 14px;color:#1f2d80}.input{width:100%;padding:12px;border:1px solid #d5ddf0;border-radius:10px;margin-bottom:10px}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;background:#1f2d80;color:#fff;font-weight:700;cursor:pointer}
        .err{background:#fdecea;color:#b71c1c;padding:10px;border-radius:8px;margin-bottom:10px}.ok{background:#e8f5e9;color:#1b5e20;padding:10px;border-radius:8px;margin-bottom:10px}
        .links{margin-top:12px;font-size:14px}.links a{color:#1f2d80;text-decoration:none;font-weight:600}
    </style>
</head>
<body>
<form class="card" method="POST" action="/forgot-password">
    <div class="logo"><img src="{{ url_for('static', filename='iris_logo.png') }}" alt="IRIS Logo"/><strong>IRIS</strong></div>
    <h2>Reset password</h2>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    {% if success %}<div class="ok">{{ success }}</div>{% endif %}
    <input class="input" type="email" name="email" placeholder="Registered email" required />
    <input class="input" type="password" name="new_password" placeholder="New password (min 8 chars)" required />
    <input class="input" type="password" name="confirm_password" placeholder="Confirm new password" required />
    <button class="btn" type="submit">Reset Password</button>
    <div class="links"><a href="/login">Back to login</a></div>
</form>
</body>
</html>
